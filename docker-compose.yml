services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://fsm:fsm@db:5432/fsm
      SECRET_KEY: development-only-secret
      PUBLIC_APP_URL: http://localhost:8000
      PYTHONPATH: /app
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fsm
      POSTGRES_USER: fsm
      POSTGRES_PASSWORD: fsm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fsm"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
